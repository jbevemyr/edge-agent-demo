<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo – agent + app + lokal LLM</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #00bcd4;
      --border: #2d3a4d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    main { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 0.25rem; }
    p.sub { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.95rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      resize: vertical;
    }
    button {
      margin-top: 0.75rem;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #041014;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .out {
      margin-top: 1.5rem;
      padding: 1rem 1.1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 3rem;
    }
    .audit {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      max-height: 220px;
      overflow: auto;
      border: 1px dashed var(--border);
      padding: 0.75rem;
      border-radius: 8px;
      font-family: ui-monospace, monospace;
    }
    .err { color: #ff8a80; }
  </style>
</head>
<body>
  <main>
    <h1>Agentdemo</h1>
    <p class="sub">Fråga agenten (lokal modell + verktyg mot appen, valfri moln-LLM via <code>ask_cloud_llm</code>).</p>
    <label for="q">Meddelande</label>
    <textarea id="q" placeholder="T.ex. Lista försenade ärenden och gör en kort sammanfattning."></textarea>
    <button type="button" id="send">Skicka</button>
    <div class="out" id="reply" aria-live="polite"></div>
    <div class="audit" id="audit" hidden></div>
  </main>
  <script>
    const q = document.getElementById("q");
    const send = document.getElementById("send");
    const reply = document.getElementById("reply");
    const auditEl = document.getElementById("audit");

    send.addEventListener("click", async () => {
      const message = q.value.trim();
      if (!message) return;
      send.disabled = true;
      reply.textContent = "…";
      auditEl.hidden = true;
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          reply.innerHTML = '<span class="err">' + (data.detail || res.statusText) + "</span>";
          return;
        }
        reply.textContent = data.reply || "";
        if (data.audit && data.audit.length) {
          auditEl.hidden = false;
          auditEl.textContent = JSON.stringify(data.audit, null, 2);
        }
      } catch (e) {
        reply.innerHTML = '<span class="err">' + String(e) + "</span>";
      } finally {
        send.disabled = false;
      }
    });
  </script>
</body>
</html>
