# Run pre-built images from GHCR (same tag for all three).
# Example:
#   export REGISTRY=ghcr.io/jbevemyr/edge-agent-demo
#   export VERSION=v0.1.0
#   docker compose -f docker-compose.release.yml pull
#   docker compose -f docker-compose.release.yml up -d

services:
  app:
    image: ${REGISTRY:?set REGISTRY}/app:${VERSION:?set VERSION}
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  local-llm:
    image: ${REGISTRY}/local-llm:${VERSION}
    ipc: host
    shm_size: "4gb"
    gpus: all
    ports:
      - "8000:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      HF_HUB_ENABLE_HF_TRANSFER: "1"
    command:
      - "--model"
      - "Qwen/Qwen2.5-0.5B-Instruct"
      - "--max-model-len"
      - "4096"
      - "--dtype"
      - "auto"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=5).read()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 180s

  agent:
    image: ${REGISTRY}/agent:${VERSION}
    ports:
      - "8002:8002"
    environment:
      APP_URL: http://app:8001
      LOCAL_LLM_BASE: http://local-llm:8000/v1
      LOCAL_MODEL: Qwen/Qwen2.5-0.5B-Instruct
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLOUD_MODEL: ${CLOUD_MODEL:-gpt-4o-mini}
    depends_on:
      app:
        condition: service_healthy
      local-llm:
        condition: service_healthy

volumes:
  huggingface-cache:
